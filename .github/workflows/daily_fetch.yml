name: Fetch Intercom Data Daily

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Intercom data
        env:
          INTERCOM_TOKEN: ${{ secrets.INTERCOM_TOKEN }}
        run: python3 fetch_intercom.py

      - name: Run notifications
        env:
          SLACK_WEBHOOK_CSM_TEAM:   ${{ secrets.SLACK_WEBHOOK_CSM_TEAM }}
          SLACK_WEBHOOK_SN_SUPPORT: ${{ secrets.SLACK_WEBHOOK_SN_SUPPORT }}
        run: python3 notify.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json archive.json notified.json
          git diff --staged --quiet || git commit -m "chore: update Intercom data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
